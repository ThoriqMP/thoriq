; =============================================
; TaskVault - Custom PHP ini for local dev
; =============================================

; Increase memory limit to handle large files
memory_limit = 512M

; Increase max file upload size
upload_max_filesize = 100M

; Increase POST body limit
post_max_size = 110M

; Set max execution time for large uploads (seconds)
max_execution_time = 120
max_input_time = 120
